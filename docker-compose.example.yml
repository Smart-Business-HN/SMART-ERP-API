# Ejemplo de docker-compose para desarrollo local
# Este archivo es opcional y solo para referencia
# Dokploy manejará el despliegue automáticamente

version: '3.8'

services:
  smarterp-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smarterp-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Las siguientes variables deben configurarse en Dokploy como variables de entorno
      # - ConnectionStrings__Database=your_connection_string
      # - ConnectionStrings__RedisServer=your_redis_connection
      # - ConnectionStrings__AzureBlobStorage=your_blob_storage_connection
      # - JWTSettings__Key=your_jwt_key
      # - JWTSettings__Issuer=your_issuer
      # - JWTSettings__Audience=your_audience
      # - Sentry__Dsn=your_sentry_dsn
    restart: unless-stopped
    networks:
      - smarterp-network

networks:
  smarterp-network:
    driver: bridge

